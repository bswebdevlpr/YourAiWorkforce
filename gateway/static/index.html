<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YourAiWorkforce — 스트리밍 데모</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --line: #262b36;
    --fg: #e6e8ec; --muted: #8b93a1; --accent: #6ea8fe;
    --user: #1e3a5f; --warn: #3a2f1a; --warn-line: #7a5c1e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: var(--bg); color: var(--fg);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
  }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { margin: 0; font-size: 15px; font-weight: 600; }
  .thread { color: var(--muted); font-size: 12px; font-family: ui-monospace, monospace; }
  #new { margin-left: auto; }

  #log { flex: 1; overflow-y: auto; padding: 20px; }
  .msg { max-width: 760px; margin: 0 auto 14px; padding: 12px 16px; border-radius: 10px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: var(--user); }
  .msg.agent { background: var(--panel); border: 1px solid var(--line); }
  .msg.sys { background: none; color: var(--muted); font-size: 13px; text-align: center; padding: 4px; }
  .msg.err { background: #3a1a1a; border: 1px solid #7a2e2e; }

  /* interrupt = 사람의 승인을 기다리는 상태. 시각적으로 확실히 구분한다. */
  .interrupt {
    max-width: 760px; margin: 0 auto 14px; padding: 14px 16px;
    background: var(--warn); border: 1px solid var(--warn-line); border-radius: 10px;
  }
  .interrupt .label { font-size: 12px; color: #d9b45f; margin-bottom: 8px; font-weight: 600; }
  .interrupt .result { white-space: pre-wrap; margin-bottom: 12px; }
  .opts { display: flex; gap: 8px; flex-wrap: wrap; }
  .opts button { background: var(--panel); color: var(--fg); border: 1px solid var(--line); }

  footer { border-top: 1px solid var(--line); padding: 12px 20px; }
  .row { max-width: 760px; margin: 0 auto; display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel); color: var(--fg);
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 10px 16px; border-radius: 8px; border: 1px solid var(--accent);
    background: var(--accent); color: #0b1220; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .45; cursor: not-allowed; }
  .cursor::after { content: "▋"; animation: blink 1s steps(2) infinite; color: var(--accent); }
  @keyframes blink { 0%,50% { opacity: 1 } 50.01%,100% { opacity: 0 } }
</style>
</head>
<body>
  <header>
    <h1>YourAiWorkforce</h1>
    <span class="thread" id="threadLabel"></span>
    <button id="new">새 대화</button>
  </header>

  <div id="log"></div>

  <footer>
    <div class="row">
      <input type="text" id="input" placeholder="메시지를 입력하세요…" autocomplete="off">
      <button id="send">보내기</button>
    </div>
  </footer>

<script>
const log = document.getElementById("log");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const newBtn = document.getElementById("new");
const threadLabel = document.getElementById("threadLabel");

let threadId = null;
// nextType — 다음 POST에 실을 type.
// 게이트웨이가 내려주는 done/interrupt 이벤트에 따라 이 값이 바뀐다.
//   done      → "message" (평범한 대화 계속)
//   interrupt → "reply"   (멈춰있는 그래프를 resume)
let nextType = "new";
let busy = false;

function newThread() {
  threadId = crypto.randomUUID();
  nextType = "new";
  log.innerHTML = "";
  threadLabel.textContent = threadId.slice(0, 8);
  addSys("새 스레드 시작");
  setBusy(false);
}

function el(cls, text) {
  const d = document.createElement("div");
  d.className = cls;
  if (text !== undefined) d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}
const addSys = (t) => el("msg sys", t);

function setBusy(b) {
  busy = b;
  sendBtn.disabled = b;
  input.disabled = b;
  if (!b) input.focus();
}

// send — 한 턴을 실행한다.
// type: "new" | "message" | "reply" | "complete" | "reject"
async function send(message, type) {
  if (busy) return;
  setBusy(true);

  if (message) el("msg user", message);

  // 토큰이 도착할 자리. 커서를 깜빡여 "생성 중"을 보여준다.
  const bubble = el("msg agent cursor", "");

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: message || "", thread_id: threadId, type }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    // ── SSE를 직접 파싱한다 ──
    // EventSource는 GET만 되므로 쓸 수 없다. fetch의 body는 ReadableStream이라
    // 조각(chunk)이 도착하는 대로 읽을 수 있다. 조각은 SSE 이벤트 경계와 무관하게
    // 끊겨서 오므로, buffer에 이어붙였다가 "\n\n"(이벤트 경계)로 잘라 처리한다.
    // — Go 쪽에서 Scanner를 버리고 Read로 내려간 것과 같은 이유다.
    const reader = res.body.pipeThrough(new TextDecoderStream()).getReader();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += value;

      let idx;
      while ((idx = buffer.indexOf("\n\n")) !== -1) {
        const frame = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        handleEvent(parseFrame(frame), bubble);
      }
    }
  } catch (err) {
    bubble.classList.remove("cursor");
    el("msg err", `오류: ${err.message}`);
    setBusy(false);
  }
}

// parseFrame — "event: token\ndata: {...}" 한 덩어리를 {event, data}로.
function parseFrame(frame) {
  let event = "message", data = "";
  for (const line of frame.split("\n")) {
    if (line.startsWith("event: ")) event = line.slice(7);
    else if (line.startsWith("data: ")) data += line.slice(6);
  }
  try { data = JSON.parse(data); } catch { /* 그대로 둔다 */ }
  return { event, data };
}

// handleEvent — 게이트웨이가 설계한 프로토콜을 UI 동작으로 옮긴다.
// 이 switch가 짧고 명확한 게 곧 프로토콜 설계가 잘 됐다는 증거다.
function handleEvent({ event, data }, bubble) {
  switch (event) {
    case "token":
      bubble.textContent += data.text ?? "";
      log.scrollTop = log.scrollHeight;
      break;

    case "done":
      // 턴이 정상 종료 → 평범하게 대화를 이어간다.
      bubble.classList.remove("cursor");
      if (!bubble.textContent) bubble.remove();
      nextType = "message";
      setBusy(false);
      break;

    case "interrupt":
      // 그래프가 사람을 기다리며 멈췄다 → 선택지를 띄운다.
      bubble.classList.remove("cursor");
      if (!bubble.textContent) bubble.remove();
      renderInterrupt(data);
      nextType = "reply";
      setBusy(false);
      break;

    case "error":
      bubble.classList.remove("cursor");
      el("msg err", `업스트림 오류: ${data.message ?? ""}`);
      setBusy(false);
      break;
  }
}

// renderInterrupt — {"result": "...", "options": ["reply","complete","reject"]}
function renderInterrupt(data) {
  const box = el("interrupt");

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = "⏸ 승인 대기 — 사람의 응답이 필요합니다";
  box.appendChild(label);

  const result = document.createElement("div");
  result.className = "result";
  result.textContent = data.result ?? "";
  box.appendChild(result);

  const opts = document.createElement("div");
  opts.className = "opts";
  for (const opt of data.options ?? []) {
    // reply는 입력창으로 답하므로 버튼을 만들지 않는다.
    if (opt === "reply") continue;
    const b = document.createElement("button");
    b.textContent = opt === "complete" ? "완료" : opt === "reject" ? "중단" : opt;
    b.onclick = () => {
      opts.querySelectorAll("button").forEach((x) => (x.disabled = true));
      addSys(`[${b.textContent}] 선택`);
      send("", opt);   // type=complete / type=reject
    };
    opts.appendChild(b);
  }
  box.appendChild(opts);
  log.scrollTop = log.scrollHeight;
}

function submit() {
  const msg = input.value.trim();
  if (!msg || busy) return;
  input.value = "";
  send(msg, nextType);
}

sendBtn.onclick = submit;
input.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
newBtn.onclick = newThread;

newThread();
</script>
</body>
</html>
